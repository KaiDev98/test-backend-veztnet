name: 🧪 PropShare API — Test Suite

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       propshare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🗄️ Sync Database
        env:
          NODE_ENV:     test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/propshare_test
          PGPASSWORD:   postgres
        run: |
          psql -h localhost -U postgres -d propshare_test -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (
                SELECT 1 FROM pg_type WHERE typname = 'enum_properties_status'
              ) THEN
                CREATE TYPE \"enum_properties_status\" AS ENUM (
                  'PENDING',
                  'ACTIVE',
                  'READY_TO_RENT',
                  'FULLY_OCCUPIED',
                  'FUNDED',
                  'REJECTED',
                  'INACTIVE'
                );
              END IF;
            END \$\$;
          "


      - name: 🌱 Seed Test Users
  env:
    NODE_ENV:     test
    DATABASE_URL: postgresql://postgres:postgres@localhost:5432/propshare_test
  run: |
    node -e "
    const { sequelize, User } = require('./src/models');
    const bcrypt = require('bcryptjs');

    async function seed() {
      await sequelize.authenticate();
      await sequelize.sync({ force: false });

      const hash = await bcrypt.hash('password123', 10);

      await User.findOrCreate({
        where: { id: '00000000-0000-0000-0000-000000000001' },
        defaults: { id: '00000000-0000-0000-0000-000000000001', email: 'admin@test.com', password: hash, fullName: 'Admin Test', role: 'ADMIN', isSuspended: false }
      });
      await User.findOrCreate({
        where: { id: '00000000-0000-0000-0000-000000000002' },
        defaults: { id: '00000000-0000-0000-0000-000000000002', email: 'owner@test.com', password: hash, fullName: 'Owner Test', role: 'OWNER', isSuspended: false }
      });
      await User.findOrCreate({
        where: { id: '00000000-0000-0000-0000-000000000003' },
        defaults: { id: '00000000-0000-0000-0000-000000000003', email: 'investor@test.com', password: hash, fullName: 'Investor Test', role: 'INVESTOR', isSuspended: false }
      });

      console.log('Seed users berhasil');
      await sequelize.close();
    }

    seed().catch(e => { console.error(e); process.exit(1); });
    "

        env:
          NODE_ENV:     test

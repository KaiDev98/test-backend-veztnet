name: 🧪 PropShare API — Test Suite

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       propshare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🗄️ Sync Database
        env:
          NODE_ENV:     test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/propshare_test
          PGPASSWORD:   postgres
        run: |
          psql -h localhost -U postgres -d propshare_test -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (
                SELECT 1 FROM pg_type WHERE typname = 'enum_properties_status'
              ) THEN
                CREATE TYPE \"enum_properties_status\" AS ENUM (
                  'PENDING',
                  'ACTIVE',
                  'READY_TO_RENT',
                  'FULLY_OCCUPIED',
                  'FUNDED',
                  'REJECTED',
                  'INACTIVE'
                );
              END IF;
            END \$\$;
          "

      - name: 🧪 Run Tests with Coverage
        env:
          NODE_ENV:            test
          DATABASE_URL:        postgresql://postgres:postgres@localhost:5432/propshare_test
          JWT_SECRET:          test-secret-key
          TEST_ADMIN_TOKEN:    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjEiLCJyb2xlIjoiQURNSU4iLCJpYXQiOjE3ODA5MTM1MjksImV4cCI6MTg2NzIyNzEyOX0.ExYmEparswzMpqqHP2twFoWp8lAPkQQKBU6Hngvp0mM"
          TEST_OWNER_TOKEN:    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjIiLCJyb2xlIjoiT1dORVIiLCJpYXQiOjE3ODA5MTM1MjksImV4cCI6MTg2NzIyNzEyOX0.CchwfF9ov2bastA69lyrTj8SPwHeAU6S_NQUyfVczvM"
          TEST_INVESTOR_TOKEN: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjMiLCJyb2xlIjoiSU5WRVNUT1IiLCJpYXQiOjE3ODA5MTM1MjksImV4cCI6MTg2NzIyNzEyOX0.M2ZIwcEdiqeq2YlGJtNqhEJ9Rbvib8-NypFaqkcj69w"
        run: npm test -- --coverage --forceExit

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: 📋 Coverage Summary
        if: always()
        run: |
          echo "## 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json 2>/dev/null || echo "Coverage file not found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY